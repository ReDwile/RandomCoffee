name: Validate anonymous facts chat

on:
  push:
    branches: ["master"]
    paths:
      - "anonymous-facts-chat/**"
      - ".github/workflows/deploy-anonymous-facts.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check static app
        run: |
          test -s anonymous-facts-chat/index.html
          grep -q "Анонимные факты" anonymous-facts-chat/index.html
          grep -q "EventSource" anonymous-facts-chat/index.html
