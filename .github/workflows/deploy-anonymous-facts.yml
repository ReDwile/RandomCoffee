name: Deploy anonymous facts chat

on:
  push:
    branches: ["master"]
    paths:
      - "anonymous-facts-chat/**"
      - ".github/workflows/deploy-anonymous-facts.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: anonymous-facts-chat

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
