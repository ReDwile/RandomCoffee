<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Анонимные факты</title>
<style>
:root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:#151515;background:#f4f4f1}
*{box-sizing:border-box}body{margin:0;min-height:100dvh;padding:16px 12px calc(16px + env(safe-area-inset-bottom))}
.app{width:min(720px,100%);min-height:calc(100dvh - 32px);margin:auto;display:grid;grid-template-rows:auto minmax(260px,1fr) auto;gap:12px}
h1{margin:0 0 6px;font-size:clamp(30px,7vw,48px);letter-spacing:-.04em;line-height:1}.sub{margin:0;color:#77776f;line-height:1.4}
.panel{background:#fff;border:1px solid #e3e3dc;border-radius:20px;box-shadow:0 12px 35px rgba(0,0,0,.04)}
#feed{overflow:auto;padding:10px;min-height:0}.empty{height:100%;min-height:220px;display:grid;place-items:center;text-align:center;color:#77776f;padding:30px}
.msg{padding:13px 14px;border-radius:15px;background:#f7f7f4;margin-bottom:9px;overflow-wrap:anywhere}.msg:last-child{margin-bottom:0}
.meta{display:flex;justify-content:space-between;gap:12px;margin-bottom:5px;color:#77776f;font-size:12px}.text{white-space:pre-wrap;font-size:16px;line-height:1.45}
form{padding:12px}textarea{width:100%;min-height:90px;border:0;outline:0;resize:vertical;padding:5px 4px 10px;background:transparent;color:#151515;font:inherit;font-size:17px;line-height:1.4}
.foot{display:flex;align-items:center;justify-content:space-between;gap:12px}.status{font-size:12px;color:#77776f}.status.err{color:#a52a2a}
button{border:0;border-radius:999px;background:#151515;color:#fff;padding:12px 20px;font:inherit;font-weight:700;cursor:pointer}button:disabled{opacity:.45}
</style>
</head>
<body>
<main class="app">
<header><h1>Анонимные факты</h1><p class="sub">Напиши факт. Имя не спрашиваем — сообщение сразу появится в общей ленте.</p></header>
<section id="feed" class="panel" aria-live="polite"><div id="empty" class="empty">Пока здесь тихо.<br>Отправь первый факт 👀</div></section>
<form id="form" class="panel">
<textarea id="fact" maxlength="600" placeholder="Напиши свой факт…" required></textarea>
<div class="foot"><div id="status" class="status">Ctrl/⌘ + Enter — отправить</div><button id="send">Отправить</button></div>
</form>
</main>
<script>
const TOPIC='facts-chat-CkT8Gc6RxIXWE7PtN0sIDA';
const API=`https://ntfy.sh/${TOPIC}`;
const feed=document.querySelector('#feed');
const empty=document.querySelector('#empty');
const form=document.querySelector('#form');
const input=document.querySelector('#fact');
const send=document.querySelector('#send');
const statusEl=document.querySelector('#status');
const seen=new Set();
const messages=[];

function status(text,error=false){
  statusEl.textContent=text;
  statusEl.classList.toggle('err',error);
}

function time(ts){
  return new Intl.DateTimeFormat('ru-RU',{hour:'2-digit',minute:'2-digit'}).format(new Date(ts*1000));
}

function render(){
  messages.sort((a,b)=>a.time-b.time||a.id.localeCompare(b.id));
  feed.innerHTML='';
  if(!messages.length){feed.appendChild(empty);return;}
  for(const item of messages){
    const card=document.createElement('article');
    card.className='msg';
    const meta=document.createElement('div');
    meta.className='meta';
    const author=document.createElement('span');
    author.textContent='Аноним';
    const when=document.createElement('time');
    when.textContent=time(item.time);
    const text=document.createElement('div');
    text.className='text';
    text.textContent=item.message;
    meta.append(author,when);
    card.append(meta,text);
    feed.appendChild(card);
  }
}

function add(item,scroll=true){
  if(!item||item.event!=='message'||!item.id||seen.has(item.id))return;
  seen.add(item.id);
  messages.push(item);
  render();
  if(scroll)requestAnimationFrame(()=>feed.scrollTop=feed.scrollHeight);
}

async function history(){
  try{
    const r=await fetch(`${API}/json?poll=1&since=all`,{cache:'no-store'});
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    for(const line of (await r.text()).split('\n')){
      if(line.trim())add(JSON.parse(line),false);
    }
    feed.scrollTop=feed.scrollHeight;
  }catch(e){
    console.error(e);
    status('История не загрузилась. Новые сообщения всё равно могут прийти.',true);
  }
}

function live(){
  const es=new EventSource(`${API}/sse`);
  es.onopen=()=>status('Ctrl/⌘ + Enter — отправить');
  es.onmessage=e=>{try{add(JSON.parse(e.data));}catch(err){console.error(err);}};
  es.onerror=()=>status('Переподключаюсь к общему чату…');
}

async function submit(){
  const fact=input.value.trim();
  if(!fact||send.disabled)return;
  send.disabled=true;
  input.disabled=true;
  status('Отправляю…');
  try{
    const r=await fetch(API,{method:'POST',body:fact});
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    input.value='';
    status('Отправлено анонимно ✓');
  }catch(e){
    console.error(e);
    status(`Не отправилось: ${e.message}`,true);
  }finally{
    send.disabled=false;
    input.disabled=false;
    input.focus();
  }
}

form.addEventListener('submit',e=>{e.preventDefault();submit();});
input.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();submit();}
});
live();
history();
</script>
</body>
</html>
